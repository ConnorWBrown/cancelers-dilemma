<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Choice - Cancelers Dilemma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .user-badge {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .instructions {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
            color: #666;
            line-height: 1.6;
        }
        
        .choices {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .choice {
            flex: 1;
        }
        
        .choice input[type="radio"] {
            display: none;
        }
        
        .choice label {
            display: block;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
        }
        
        .choice input[type="radio"]:checked + label {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
        }
        
        .choice label:hover {
            border-color: #667eea;
        }
        
        .button {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cancelers Dilemma</h1>
        <div class="user-badge">You are Player {{ user }}</div>
        
        <div class="instructions">
            <p>Your choice will be hidden from the other player.</p>
            <p style="margin-top: 10px;">What would you like to do?</p>
        </div>
        
        <form method="POST" action="{{ url_for('submit_choice', event_id=event_id) }}">
            <input type="hidden" name="user" value="{{ user }}">
            
            <div class="choices">
                <div class="choice">
                    <input type="radio" id="cancel" name="choice" value="cancel" required>
                    <label for="cancel">Cancel</label>
                </div>
                <div class="choice">
                    <input type="radio" id="dont_cancel" name="choice" value="dont_cancel" required>
                    <label for="dont_cancel">Don't Cancel</label>
                </div>
            </div>
            
            <button type="submit" class="button">Submit Choice</button>
        </form>
    </div>
</body>
</html>
