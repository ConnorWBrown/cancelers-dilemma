<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting - Cancelers Dilemma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .status {
            margin-bottom: 30px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .join-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }
        
        .join-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .join-url {
            background: white;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            word-break: break-all;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .join-url:hover {
            background: #f9f9f9;
        }
        
        .copy-button {
            display: inline-block;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        .copy-button:hover {
            background: #764ba2;
        }
        
        .copy-feedback {
            display: none;
            color: #4caf50;
            margin-top: 10px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Waiting for Player 2...</h1>
        
        <div class="status">
            <div class="spinner"></div>
            <p class="message">Your choice has been submitted!</p>
            <p class="message">Waiting for the other player to make their choice...</p>
        </div>
        
        <div class="join-section">
            <h3>Share this link with Player 2:</h3>
            <div class="join-url" id="joinUrl">{{ join_url }}</div>
            <button class="copy-button" onclick="copyToClipboard()">Copy Link</button>
            <div class="copy-feedback" id="copyFeedback">Copied to clipboard!</div>
        </div>
    </div>
    
    <script>
        function copyToClipboard() {
            const url = document.getElementById('joinUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.style.display = 'block';
                setTimeout(() => {
                    feedback.style.display = 'none';
                }, 2000);
            });
        }
        
        // Poll for completion
        function checkStatus() {
            fetch('{{ url_for("event_status", event_id=event_id) }}')
                .then(response => response.json())
                .then(data => {
                    if (data.complete) {
                        window.location.href = '{{ url_for("result_page", event_id=event_id) }}';
                    }
                })
                .catch(error => console.error('Error:', error));
        }
        
        // Check every 2 seconds
        setInterval(checkStatus, 2000);
    </script>
</body>
</html>
